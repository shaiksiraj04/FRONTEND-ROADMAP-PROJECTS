<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Cards</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <section class="pricing">

        <h1>Choose Your Plan</h1>

        <div class="cards">

            <div class="card">

                <h2>Basic</h2>

                <div class="price">$9<span>/month</span></div>

                <ul>
                    <li><i class="fa-solid fa-check"></i> 5 Projects</li>
                    <li><i class="fa-solid fa-check"></i> 5GB Storage</li>
                    <li><i class="fa-solid fa-check"></i> Email Support</li>
                </ul>

                <button>Select Plan</button>

            </div>


            <div class="card popular">

                <div class="badge">
                    Popular
                </div>

                <h2>Pro</h2>

                <div class="price">$29<span>/month</span></div>

                <ul>
                    <li><i class="fa-solid fa-check"></i> 25 Projects</li>
                    <li><i class="fa-solid fa-check"></i> 50GB Storage</li>
                    <li><i class="fa-solid fa-check"></i> Priority Support</li>
                </ul>

                <button>Select Plan</button>

            </div>


            <div class="card">

                <h2>Enterprise</h2>

                <div class="price">$99<span>/month</span></div>

                <ul>
                    <li><i class="fa-solid fa-check"></i> Unlimited Projects</li>
                    <li><i class="fa-solid fa-check"></i> 500GB Storage</li>
                    <li><i class="fa-solid fa-check"></i> 24/7 Support</li>
                </ul>

                <button>Select Plan</button>

            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
